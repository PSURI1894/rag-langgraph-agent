name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # setup-uv@v6 still bundles a Node 20 runtime; opt its JS action into Node 24
  # ahead of the 2026-06-16 forced cutover (and Node 20 removal in September).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

      # The next two steps need no API key: ingestion clones the docs and
      # embeds locally, and the retrieval-only evals score hit@k / MRR.
      - name: Build vector index
        run: uv run python -m rag_agent.ingest

      - name: Retrieval evals
        run: uv run python evals/run_evals.py --retrieval-only
